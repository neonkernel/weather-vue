<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Sun -->
  <circle cx="38" cy="38" r="18" fill="url(#sunGrad)" opacity="0.95"/>
  <!-- Sun rays -->
  <line x1="38" y1="12" x2="38" y2="18" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="38" y1="58" x2="38" y2="64" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="38" x2="18" y2="38" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="58" y1="38" x2="64" y2="38" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="20" y1="20" x2="25" y2="25" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="51" y1="51" x2="56" y2="56" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="56" y1="20" x2="51" y2="25" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <line x1="25" y1="51" x2="20" y2="56" stroke="#f59e0b" stroke-width="3" stroke-linecap="round"/>
  <!-- Cloud -->
  <ellipse cx="60" cy="68" rx="22" ry="14" fill="url(#cloudGrad)"/>
  <ellipse cx="48" cy="72" rx="14" ry="10" fill="url(#cloudGrad)"/>
  <ellipse cx="72" cy="72" rx="12" ry="9" fill="url(#cloudGrad)"/>
  <ellipse cx="60" cy="78" rx="24" ry="10" fill="url(#cloudGrad)"/>
</svg>