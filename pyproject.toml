[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "summarizer"
version = "0.1.0"
description = "Multi-provider LLM document summarizer"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.0.0",
    "anthropic>=0.25.0",
    "requests>=2.31.0",
    "tiktoken>=0.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.0.0",
]

[project.scripts]
summarize = "summarizer.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = ["-v", "--tb=short"]

[tool.hatch.build.targets.wheel]
packages = ["src/summarizer"]