[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "summarizer"
version = "0.1.0"
description = "AI-powered article summarisation tool with plugin support"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "Summarizer Contributors" },
]
keywords = ["summarization", "nlp", "ai", "llm"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Text Processing :: Linguistic",
]
dependencies = [
    "click>=8.0",
    "httpx>=0.24",
    "pydantic>=2.0",
    "rich>=13.0",
    "tomli>=2.0; python_version < '3.11'",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "pytest-cov>=4.0",
    "ruff>=0.1",
    "mypy>=1.0",
]
nlp = [
    # Optional: richer stopword lists for KeywordExtractor
    "nltk>=3.8",
]

[project.urls]
Homepage = "https://github.com/example/summarizer"
Documentation = "https://github.com/example/summarizer/blob/main/docs/plugin_development.md"
Repository = "https://github.com/example/summarizer"
"Bug Tracker" = "https://github.com/example/summarizer/issues"

# ---------------------------------------------------------------------------
# Console Scripts
# ---------------------------------------------------------------------------

[project.scripts]
summarize = "summarizer.cli:main"

# ---------------------------------------------------------------------------
# Plugin Entry Points
#
# This section documents the three plugin hook groups that third-party
# packages can use to extend summarizer without modifying its source.
#
# Group: summarizer.extractors
#   Register a custom article extractor (subclass of BaseExtractor).
#   Entry point value: "your_package.module:YourExtractorClass"
#
# Group: summarizer.postprocessors
#   Register a custom post-processor (subclass of BasePostProcessor).
#   Entry point value: "your_package.module:YourPostProcessorClass"
#
# Group: summarizer.formatters
#   Register a custom output formatter (subclass of BaseFormatter).
#   Entry point value: "your_package.module:YourFormatterClass"
#
# Built-in plugins are registered here so they are auto-discovered
# when the package is installed.
# ---------------------------------------------------------------------------

[project.entry-points."summarizer.postprocessors"]
keyword_extractor = "summarizer.plugins.builtin.keyword_extractor:KeywordExtractor"
readability_scorer = "summarizer.plugins.builtin.readability:ReadabilityScorer"

# Uncomment to register built-in extractors or formatters in the future:
# [project.entry-points."summarizer.extractors"]
# default_extractor = "summarizer.ingestion.extractor:DefaultExtractor"

# [project.entry-points."summarizer.formatters"]
# markdown_formatter = "summarizer.formatter:MarkdownFormatter"

# ---------------------------------------------------------------------------
# Tool Configuration
# ---------------------------------------------------------------------------

[tool.hatch.build.targets.wheel]
packages = ["src/summarizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "--tb=short -q"

[tool.ruff]
line-length = 100
target-version = "py39"
src = ["src"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.9"
strict = false
ignore_missing_imports = true