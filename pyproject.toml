[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "summarizer"
version = "0.1.0"
description = "AI-powered article summariser with a plugin system"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
keywords = ["summariser", "nlp", "ai", "plugins"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]

dependencies = [
    "httpx>=0.25",
    "beautifulsoup4>=4.12",
    "rich>=13.0",
]

[project.optional-dependencies]
nlp = [
    "nltk>=3.8",
]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "pytest-cov>=4.1",
    "ruff>=0.1",
    "mypy>=1.6",
]

[project.scripts]
summarize = "summarizer.cli:main"

# ---------------------------------------------------------------------------
# Built-in plugin entry points
#
# Third-party plugin authors register their own entry points in the same
# groups inside *their* package's pyproject.toml, e.g.:
#
#   [project.entry-points."summarizer.postprocessors"]
#   my_sentiment = "my_package.plugins:SentimentAnalyser"
#
# The three supported groups are:
#   summarizer.extractors      → subclass of BaseExtractor
#   summarizer.postprocessors  → subclass of BasePostProcessor
#   summarizer.formatters      → subclass of BaseFormatter
# ---------------------------------------------------------------------------

[project.entry-points."summarizer.extractors"]
# (No built-in extractors — the default HTTP extractor is used automatically)

[project.entry-points."summarizer.postprocessors"]
keyword_extractor = "summarizer.plugins.builtin.keyword_extractor:KeywordExtractor"
readability_scorer = "summarizer.plugins.builtin.readability:ReadabilityScorer"

[project.entry-points."summarizer.formatters"]
# (No built-in formatters beyond the default str() representation)

# ---------------------------------------------------------------------------
# Tool configuration
# ---------------------------------------------------------------------------

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
log_cli = false

[tool.ruff]
line-length = 100
target-version = "py310"
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = true