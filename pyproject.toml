[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "summarizer"
version = "0.1.0"
description = "AI-powered article summarisation tool with a plugin system."
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "click>=8.0",
    "httpx>=0.24",
    "beautifulsoup4>=4.12",
    "lxml>=4.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "ruff",
    "mypy",
]

# ---------------------------------------------------------------------------
# CLI entry point
# ---------------------------------------------------------------------------
[project.scripts]
summarize = "summarizer.cli:main"

# ---------------------------------------------------------------------------
# Plugin entry points
#
# Third-party packages announce their plugins by declaring entry points under
# one of the three groups below in their own pyproject.toml.  The summarizer
# PluginRegistry discovers them automatically at startup via importlib.metadata.
#
# Group                      | Base class           | Purpose
# -------------------------- | -------------------- | -----------------------
# summarizer.extractors      | BaseExtractor        | Custom content fetching
# summarizer.postprocessors  | BasePostProcessor    | Enrich/mutate summaries
# summarizer.formatters      | BaseFormatter        | Custom output formats
#
# Built-in plugins are registered programmatically inside PluginRegistry so
# they don't need entry-point declarations.  The stubs below are left as
# commented examples for plugin authors to reference.
# ---------------------------------------------------------------------------

# [project.entry-points."summarizer.extractors"]
# my_extractor = "my_package.extractors:MyExtractor"

# [project.entry-points."summarizer.postprocessors"]
# my_postprocessor = "my_package.postprocessors:MyPostProcessor"

# [project.entry-points."summarizer.formatters"]
# my_formatter = "my_package.formatters:MyFormatter"

# ---------------------------------------------------------------------------
# Setuptools configuration
# ---------------------------------------------------------------------------
[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-dir]
"" = "src"

# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------
[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

# ---------------------------------------------------------------------------
# Ruff (linting)
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py39"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]