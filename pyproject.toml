[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "summarizer"
version = "0.1.0"
description = "AI-powered article summarizer with a lightweight plugin system."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "click>=8.1",
    "httpx>=0.27",
    "pydantic>=2.0",
    "rich>=13.0",
]

[project.optional-dependencies]
nlp = ["nltk>=3.8"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "ruff>=0.4",
    "mypy>=1.10",
]

[project.scripts]
summarize = "summarizer.cli:main"

# ---------------------------------------------------------------------------
# Built-in plugin entry points
#
# These register the bundled extractors / post-processors / formatters so
# they are discoverable via importlib.metadata.entry_points() at runtime.
#
# Third-party plugin packages should add their own [project.entry-points.*]
# sections following the same schema.
# ---------------------------------------------------------------------------

[project.entry-points."summarizer.postprocessors"]
keyword_extractor = "summarizer.plugins.builtin.keyword_extractor:KeywordExtractor"
readability       = "summarizer.plugins.builtin.readability:ReadabilityScorer"

# Placeholder sections for extractors and formatters so external packages know
# the correct group names to use.
# [project.entry-points."summarizer.extractors"]
# my_extractor = "mypkg.extractors:MyExtractor"

# [project.entry-points."summarizer.formatters"]
# my_formatter = "mypkg.formatters:MyFormatter"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "C4"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
strict = false
ignore_missing_imports = true