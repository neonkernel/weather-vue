[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "summarizer"
version = "0.1.0"
description = "AI-powered article summarization tool with a plugin system"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
dependencies = [
    "click>=8.0",
    "httpx>=0.24",
    "openai>=1.0",
    "rich>=13.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov",
    "pytest-mock",
]

# ---------------------------------------------------------------------------
# Entry points
# ---------------------------------------------------------------------------

[project.scripts]
summarizer = "summarizer.cli:cli"

# Built-in plugins are registered here so they participate in the standard
# entry-point discovery mechanism (and can be overridden by third-party packages).
# Third-party plugin authors should add the same tables to their own pyproject.toml.

[project.entry-points."summarizer.extractors"]
# Example (uncomment to activate a hypothetical custom extractor):
# my_extractor = "my_package.extractors:MyExtractor"

[project.entry-points."summarizer.postprocessors"]
keyword_extractor = "summarizer.plugins.builtin.keyword_extractor:KeywordExtractor"
readability_scorer = "summarizer.plugins.builtin.readability:ReadabilityScorer"

[project.entry-points."summarizer.formatters"]
# Example:
# html = "my_package.formatters:HtmlFormatter"

# ---------------------------------------------------------------------------
# Tool configuration
# ---------------------------------------------------------------------------

[tool.hatch.build.targets.wheel]
packages = ["src/summarizer"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.coverage.run]
source = ["src/summarizer"]
omit = ["*/tests/*"]