[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "summarizer"
version = "0.1.0"
description = "Multi-provider LLM summarizer"
requires-python = ">=3.11"

dependencies = [
    "openai>=1.0.0",
    "anthropic>=0.30.0",
    "requests>=2.31.0",
    "tiktoken>=0.7.0",
    "rich>=13.0.0",
    "click>=8.1.0",
    "httpx>=0.27.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
]

[project.scripts]
summarizer = "src.summarizer.cli:main"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]

[tool.hatch.build.targets.wheel]
packages = ["src/summarizer"]